<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="EchoWave title card">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4f8fc"/>
      <stop offset="100%" stop-color="#e6eef9"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0b6cff"/>
      <stop offset="100%" stop-color="#9cc9ff"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" rx="36" fill="url(#bg)"/>
  <rect x="72" y="72" width="1456" height="756" rx="36" fill="#ffffff" stroke="#d9e2ec" stroke-width="3"/>
  <rect x="72" y="72" width="24" height="756" rx="12" fill="#0b6cff"/>
  <g transform="translate(128 138)">
    <rect x="0" y="0" width="96" height="96" rx="24" fill="#102a43"/>
    <path d="M18 58 C30 58, 34 30, 46 30 S62 70,74 70 S90 42, 102 42" fill="none" stroke="url(#wave)" stroke-width="8" stroke-linecap="round"/>
    <circle cx="46" cy="30" r="6" fill="#dd6b20"/>
    <circle cx="74" cy="70" r="6" fill="#dd6b20"/>
  </g>
  <text x="248" y="190" fill="#102a43" font-size="78" font-family="Segoe UI, Arial, sans-serif" font-weight="700">EchoWave</text>
  <text x="248" y="252" fill="#486581" font-size="30" font-family="Segoe UI, Arial, sans-serif">Explainable time-series similarity for humans and agents</text>
  <text x="128" y="360" fill="#102a43" font-size="56" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Compare time series and datasets</text>
  <text x="128" y="422" fill="#102a43" font-size="56" font-family="Segoe UI, Arial, sans-serif" font-weight="700">with explainable structural similarity.</text>
  <text x="128" y="506" fill="#486581" font-size="28" font-family="Segoe UI, Arial, sans-serif">v0.16.0 release surface: repo, Pages, PyPI, local demo, agent-ready JSON.</text>
  <g transform="translate(128 580)">
    <rect width="614" height="164" rx="24" fill="#f7fafc" stroke="#d9e2ec" stroke-width="2"/>
    <text x="30" y="48" fill="#102a43" font-size="24" font-family="Consolas, Menlo, monospace">pip install echowave</text>
    <text x="30" y="88" fill="#102a43" font-size="24" font-family="Consolas, Menlo, monospace">echowave-demo --open-browser</text>
    <text x="30" y="128" fill="#102a43" font-size="24" font-family="Consolas, Menlo, monospace">echowave --export-pages docs</text>
  </g>
  <g transform="translate(840 548)">
    <rect width="560" height="196" rx="24" fill="#102a43"/>
    <text x="32" y="58" fill="#ffffff" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Release focus</text>
    <text x="32" y="104" fill="#dbeafe" font-size="24" font-family="Segoe UI, Arial, sans-serif">• compare-first branding</text>
    <text x="32" y="140" fill="#dbeafe" font-size="24" font-family="Segoe UI, Arial, sans-serif">• GitHub Pages-ready demos</text>
    <text x="32" y="176" fill="#dbeafe" font-size="24" font-family="Segoe UI, Arial, sans-serif">• compatibility-aware installation</text>
  </g>
</svg>
